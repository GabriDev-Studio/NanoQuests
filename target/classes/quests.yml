# ==========================================================================
#  NanoQuests — quests.yml
#  Пакет: org.nanodev.nanoquests
# ==========================================================================
#
#  КАК УСТРОЕН ИНВЕНТАРЬ (54 слота, 6 строк):
#
#   [ 0][ 1][ 2][ 3][ 4][ 5][ 6][ 7][ 8]   ← граница (закрашена)
#   [ 9][10][11][12][13][14][15][16][17]   ← строка 2 (9=граница, 17=граница)
#   [18][19][20][21][22][23][24][25][26]   ← строка 3
#   [27][28][29][30][31][32][33][34][35]   ← строка 4
#   [36][37][38][39][40][41][42][43][44]   ← строка 5
#   [45][46][47][48][49][50][51][52][53]   ← граница (49 = кнопка Назад)
#
#  Доступные слоты для квестов (не граница, не кнопки):
#  10-16, 19-25, 28-34, 37-43
#
#  ПОЛЯ КВЕСТА:
#  ┌─────────────────────────────────────────────────────────┐
#  │ display_name  — название квеста в меню                  │
#  │ description   — описание задачи                         │
#  │ icon          — иконка материал (Material)              │
#  │ category      — COMBAT | MINER | FISHER | LUMBERJACK    │
#  │ order         — порядковый номер в категории (1..N)     │
#  │ slot          — слот в меню (10-43, кроме границы)      │
#  │                 -1 или убери поле = авто                │
#  │ requires      — id квеста, который нужно выполнить      │
#  │                 перед этим. Пусто = нет требования      │
#  │ objective_type:                                         │
#  │   KILL_MOB    → mob: ИМЯ_МОБА                           │
#  │   MINE_BLOCK  → block: ИМЯ_БЛОКА                        │
#  │   CRAFT_ITEM  → item: ИМЯ_ПРЕДМЕТА                      │
#  │   COLLECT_ITEM→ item: ИМЯ_ПРЕДМЕТА                      │
#  │   TRAVEL      → amount: блоков                          │
#  │   FISH        → amount: рыб                             │
#  │ amount        — сколько нужно                           │
#  │ reward_kit    — имя кита (/kit give <player> <kit>)     │
#  │ reward_display— список строк в лоре иконки              │
#  └─────────────────────────────────────────────────────────┘
#
#  ЦЕПОЧКИ (requires):
#  Если квест имеет requires: id_другого_квеста — он НЕ отображается
#  в меню пока тот квест не выполнен. Прогресс тоже не идёт.
#  Это создаёт линейные цепочки: квест1 → квест2 → квест3 ...
#
#  ДОБАВЛЕН КЛЮЧ order — порядковый номер внутри категории.
#  Используется для сортировки и отображения прогресса.
#
# ==========================================================================

